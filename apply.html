<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <style>
       
        .header{
    background-color:#006400;
    color:white;
    padding:15px;
    text-align:center;
}

/* Contact style container */
.container{
    width:500px;
    background:white;
    margin:40px auto;
    padding:25px;
    border-radius:8px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

/* Form labels */
label{
    font-weight:bold;
}

/* Inputs */
input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Button */
button{
    background-color:#006400;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background-color:#228B22;
}

/* Back link */
.back{
    display:block;
    margin-top:10px;
    text-align:center;
    text-decoration:none;
    color:#006400;
}

    </style>
</head>
<body>
    <div class="header">
    <h1>Asaara-penstion Scheme - Application Form</h1>
   
</div>

<div class="container">

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Aadhaar Number</label>
<input type="text" placeholder="Enter Aadhaar number" required>

<label>Mobile Number</label>
<input type="tel" placeholder="Enter mobile number" required>

<label>Land in Acres</label>
<input type="number" placeholder="Enter land area" required>

<label>Bank Account Number</label>
<input type="text" placeholder="Enter account number" required>

<label>IFSC Code</label>
<input type="text" placeholder="Enter IFSC code" required>

<button type="submit">Submit Application</button>

</form>

<a href="Administration.html" class="back">← Back to Home</a>

</div>
</body>

</html>
