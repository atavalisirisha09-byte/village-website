<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="village.css">
    <style>
       
        .header{
    background-color:#006400;
    color:white;
    padding:15px;
    text-align:center;
}

/* Contact style container */
.container{
    width:500px;
    background:white;
    margin:40px auto;
    padding:25px;
    border-radius:8px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

/* Form labels */
label{
    font-weight:bold;
}

/* Inputs */
input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Button */
button{
    background-color:#006400;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background-color:#228B22;
}

/* Back link */
.back{
    display:block;
    margin-top:10px;
    text-align:center;
    text-decoration:none;
    color:#006400;
}

    </style>
</head>
<body>
    <div class="header">
    <h1>Asaara-penstion Scheme - Application Form</h1>
   
</div>

<div class="container">

<form>
        Name:
        <input type="text" required><br><br>

        Aadhaar:
        <input type="text" required><br><br>

        Mobile:
        <input type="text" required><br><br>

        Land Acres:
        <input type="number" required><br><br>

        Bank Account:
        <input type="text" required><br><br>

        IFSC:
        <input type="text" required><br><br>

        <button type="submit">Submit</button>
    </form>
</div>

<a href="Administration.html" class="back">← Back to Home</a>

</div>
</body>
</html>
